<script>
    const colors = [
    "#e6194b",
    "#3cb44b",
    "#ffe119",
    "#4363d8",
    "#f58231",
    "#911eb4",
    "#46f0f0",
    "#f032e6",
    "#bcf60c",
    "#fabebe",
    "#008080",
    "#e6beff",
    "#9a6324",
    "#fffac8",
    "#800000",
    "#aaffc3",
    "#808000",
    "#ffd8b1",
    "#000075",
    "#808080"
];

const ctx =
document.getElementById("chart");

const MAX_POINTS = 50;

const chart =
new Chart(ctx,{
    type:"line",

    data:{
        labels:[],

        // datasets:[
        // {
        //     label:"Total Requests",
        //     data:[],
        //     tension:0.3,
        //     borderWidth:2,
        //     borderColor:"blue"
        // },
        // {
        //     label:"Backend1 Hits",
        //     data:[],
        //     tension:0.3,
        //     borderWidth:2,
        //     borderColor:"green"
        // },
        // {
        //     label:"Backend2 Hits",
        //     data:[],
        //     tension:0.3,
        //     borderWidth:2,
        //     borderColor:"red"
        // }
        // ]
        datasets:[
{
    label:"Total Requests",
    data:[],
    borderWidth:3,
    tension:0.3,
    borderColor:"#000000",
    backgroundColor:"#000000"
}
]
    },

    options:{
        responsive:true,

        animation:false,

        scales:{
            x:{
                ticks:{
                    maxTicksLimit:10
                }
            },

            y:{
                beginAtZero:true
            }
        }
    }
});

const ws =
new WebSocket(
    "ws://127.0.0.1:8000/ws"
);

ws.onopen = () =>
{
    console.log(
        "WebSocket connected"
    );

    setInterval(
        () =>
        {
            if(
                ws.readyState ===
                WebSocket.OPEN
            )
            {
                ws.send("ping");
            }
        },
        1000
    );
};
let backendDatasetsCreated = false;
ws.onmessage = (event) =>
{
    const data =
        JSON.parse(event.data);
        if(!backendDatasetsCreated)
{
    const stats =
        document.getElementById(
            "backendStats"
        );

    for(const key in data)
    {
        if(
            key.startsWith(
                "backend"
            )
        )
        {
            const p =
                document.createElement(
                    "p"
                );

            p.innerHTML =
                key +
                ": <span id='" +
                key +
                "'>0</span>";

            stats.appendChild(p);

            const color =
    colors[
        (chart.data.datasets.length - 1)
        % colors.length
    ];

chart.data.datasets.push(
{
    label:key,
    data:[],
    borderWidth:2,
    tension:0.3,
    borderColor:color,
    backgroundColor:color
});
        }
    }

    backendDatasetsCreated =
        true;
}

    document.getElementById("total")
        .innerText = data.total;

    // document.getElementById("b1")
    //     .innerText = data.backend1;

    // document.getElementById("b2")
    //     .innerText = data.backend2;
    let datasetIndex = 1;

for(const key in data)
{
    if(
        key.startsWith(
            "backend"
        )
    )
    {
        document
            .getElementById(key)
            .innerText =
            data[key];

        chart
            .data
            .datasets[
                datasetIndex
            ]
            .data
            .push(
                data[key]
            );

        datasetIndex++;
    }
}

    chart.data.labels.push(
        new Date()
            .toLocaleTimeString()
    );

    // chart.data.datasets[0]
    //     .data.push(
    //         data.total
    //     );
    for(
    const ds
    of chart.data.datasets
)
{
    ds.data.shift();
}

    chart.data.datasets[1]
        .data.push(
            data.backend1
        );

    chart.data.datasets[2]
        .data.push(
            data.backend2
        );

    while(
        chart.data.labels.length
        > MAX_POINTS
    )
    {
        chart.data.labels.shift();

        chart.data.datasets.forEach(
            dataset =>
            dataset.data.shift()
        );
    }

    chart.update("none");
};

ws.onerror = (err) =>
{
    console.log(
        "WebSocket error",
        err
    );
};

ws.onclose = () =>
{
    console.log(
        "WebSocket disconnected"
    );
};

</script>
